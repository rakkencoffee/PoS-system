version: "2"
type: frontend
tech_stack:
  - TypeScript
  - Next.js 16 (App Router)
  - React 19
  - Tailwind CSS 4
  - Prisma ORM
  - Midtrans Payment Gateway
  - Olsera POS Integration
routes:
  - path: /
    file: src/app/(kiosk)/page.tsx
    auth_required: false
    description: Kiosk welcome screen with "Tap to Order" button
  - path: /menu
    file: src/app/(kiosk)/menu/page.tsx
    auth_required: false
    description: Menu browsing page with product categories and product cards
  - path: /cart
    file: src/app/(kiosk)/cart/page.tsx
    auth_required: false
    description: Cart page showing selected items, quantities, customer name input, and checkout button
  - path: /checkout
    file: src/app/(kiosk)/checkout/page.tsx
    auth_required: false
    description: Checkout page that creates a payment via Midtrans and displays QR code
  - path: /success
    file: src/app/(kiosk)/success/page.tsx
    auth_required: false
    description: Order success confirmation page shown after payment
  - path: /status
    file: src/app/(kiosk)/status/page.tsx
    auth_required: false
    description: Status board showing queue of orders and their current status (pending, preparing, ready)
  - path: /kitchen
    file: src/app/(kds)/kitchen/page.tsx
    auth_required: false
    description: Kitchen Display System dashboard for baristas to manage and update order statuses
  - path: /admin
    file: src/app/(admin)/admin/page.tsx
    auth_required: true
    description: Admin dashboard with sales overview and sync controls
features:
  - name: Kiosk Welcome Screen
    description: Landing page with branding and a "Tap to Order" button to start ordering
    files:
      - src/app/(kiosk)/page.tsx
    entry_route: /
    user_interactions:
      - View welcome screen with cafe branding
      - Click "Tap to Order" button to navigate to menu
    api_calls: []
    auth_required: false
  - name: Menu Browsing
    description: Browse product categories (Coffee Based, Non-Coffee, etc.) and view product cards with images and prices
    files:
      - src/app/(kiosk)/menu/page.tsx
      - src/components/ProductCard.tsx
      - src/components/ProductModal.tsx
    entry_route: /menu
    user_interactions:
      - Click category buttons to filter products
      - Click a product card to open product detail modal
      - Select size variant (Small, Medium, Large/Regular)
      - Select optional toppings
      - Click "Add to Cart" to add product to cart
    api_calls:
      - method: GET
        endpoint: /api/categories
      - method: GET
        endpoint: /api/menu
      - method: GET
        endpoint: /api/toppings
    auth_required: false
  - name: Cart Management
    description: View cart items, adjust quantities, enter customer name, and proceed to checkout
    files:
      - src/app/(kiosk)/cart/page.tsx
      - src/contexts/CartContext.tsx
    entry_route: /cart
    user_interactions:
      - View list of cart items with quantities and prices
      - Increase or decrease item quantity
      - Remove items from cart
      - Enter customer name (required, min 2 characters)
      - Click "Checkout" button to proceed
      - See validation error if customer name is missing
    api_calls: []
    auth_required: false
  - name: Checkout and Payment
    description: Create an order and initiate Midtrans payment, showing QR code or payment form
    files:
      - src/app/(kiosk)/checkout/page.tsx
      - src/app/api/payment/create/route.ts
      - src/lib/integrations/pos.adapter.ts
    entry_route: /checkout
    user_interactions:
      - See payment loading screen
      - View Midtrans Snap payment widget
      - Complete payment via QRIS or other method
      - Click manual retry button if payment widget fails to load
    api_calls:
      - method: POST
        endpoint: /api/payment/create
    auth_required: false
  - name: Order Status Board
    description: Public status board showing all orders and their current status (pending, preparing, ready)
    files:
      - src/app/(kiosk)/status/page.tsx
    entry_route: /status
    user_interactions:
      - View list of orders grouped by status
      - See real-time updates via SSE streaming
    api_calls:
      - method: GET
        endpoint: /api/orders/stream
    auth_required: false
  - name: Kitchen Display System
    description: Barista dashboard to view pending/preparing orders and update their status
    files:
      - src/app/(kds)/kitchen/page.tsx
    entry_route: /kitchen
    user_interactions:
      - View pending orders in queue
      - Click to move order from pending to preparing
      - Click to move order from preparing to ready
      - Click "Sync Data" button to sync with Olsera POS
      - See "Syncing..." indicator during sync
    api_calls:
      - method: GET
        endpoint: /api/orders
      - method: PATCH
        endpoint: /api/orders/[id]
    auth_required: false
  - name: Admin Dashboard
    description: Admin login and dashboard with sales data and sync controls
    files:
      - src/app/(admin)/admin/page.tsx
      - src/app/api/admin/route.ts
    entry_route: /admin
    user_interactions:
      - Enter admin username and password
      - Click login button
      - View sales overview after login
      - See error message for incorrect credentials
    api_calls:
      - method: POST
        endpoint: /api/admin
    auth_required: true
known_limitations:
  - issue: Payment gateway requires Midtrans sandbox credentials configured in environment
    location: src/app/api/payment/create/route.ts
    impact: Payment flow will fail without proper MIDTRANS_SERVER_KEY and MIDTRANS_CLIENT_KEY
  - issue: NEXT_PUBLIC_TEST_MODE=true bypasses authentication for testing
    location: src/app/(kiosk)/layout.tsx
    impact: When enabled, auth checks are skipped to allow E2E testing
